<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Learning Platform | My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="category.html">Campus Resources</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="category.html">Browse</a></li>
                    <li class="nav-item"><a class="nav-link" href="upload.html">Upload</a></li>
                    <li class="nav-item"><a class="nav-link active" href="profile.html">My Profile</a></li>
                </ul>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4 text-primary">My Dashboard</h2>

        <ul class="nav nav-tabs" id="profileTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active fw-bold" id="uploads-tab" data-bs-toggle="tab" data-bs-target="#uploads" type="button" role="tab">My Uploads</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link fw-bold" id="favorites-tab" data-bs-toggle="tab" data-bs-target="#favorites" type="button" role="tab">My Saved Materials</button>
            </li>
        </ul>

        <div class="tab-content bg-white border border-top-0 p-4 rounded-bottom shadow-sm">
            
            <div class="tab-pane fade show active" id="uploads" role="tabpanel">
                <div class="row" id="myUploadsGrid">
                    <div class="text-center w-100"><div class="spinner-border text-primary" role="status"></div></div>
                </div>
            </div>

            <div class="tab-pane fade" id="favorites" role="tabpanel">
                <div class="row" id="myFavoritesGrid">
                    <div class="text-center w-100"><div class="spinner-border text-primary" role="status"></div></div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
